syntax = "proto3";
package IMU;

message Imu
{
    double longitude = 1;
    double latitude = 2;
    double gaussX = 3;
    double gaussY = 4;
    int32 gpsValid = 5;
    double time = 6;
    double velocity = 7;
    double yaw = 8;

//add for test
    int64 ltime = 9;
    double velocityEast = 10;
    double velocityNorth = 11;
    double velocityUp = 12;
    double gyroX = 13;
    double gyroY = 14;
    double gyroZ = 15;
    double accX = 16;
    double accY = 17;
    double accZ = 18;
	
}

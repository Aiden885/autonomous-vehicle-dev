syntax = "proto3";
message RoadsideMsg
{
    int32 type=1;
    int32  objectid=2;
    double lat=3;
    double lon=4;
    double x=5;
    double y=6;
    double yaw=7;
    double velocity=8;
    double power=9;
    double finish=10;
    int32 len=11;
    int32 width=12;
    int32 height=13;
    int64 timestamp=14;
}

message RoadsideMsgVec
{
    repeated RoadsideMsg rvecMsg=1;
}

